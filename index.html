<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Princess! 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* ပန်းပွင့်ကြွေတဲ့ Animation */
        .petal {
            position: absolute;
            background-color: #ffb3c6;
            border-radius: 150% 0 150% 150%;
            opacity: 0.8;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Birthday Card */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
            border: 2px solid #ffb3c6;
        }

        @keyframes fadeIn {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ပန်းပုံစံ (SVG) */
        .flower-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        p {
            color: #594a4e;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Button */
        .btn {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.6);
        }

        /* Music credit/subtext */
        .footer {
            font-size: 0.8rem;
            color: #a39095;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- Falling Petals Background -->
    <div id="petals-container"></div>

    <!-- Main Birthday Card -->
    <div class="card">
        <!-- SVG Flower Animation -->
        <div class="flower-container">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <!-- Rose/Flower Shape -->
                <circle cx="50" cy="50" r="15" fill="#ff4d6d" />
                <circle cx="50" cy="30" r="12" fill="#ff758f" opacity="0.9"/>
                <circle cx="50" cy="70" r="12" fill="#ff758f" opacity="0.9"/>
                <circle cx="30" cy="50" r="12" fill="#ff758f" opacity="0.9"/>
                <circle cx="70" cy="50" r="12" fill="#ff758f" opacity="0.9"/>
                <circle cx="38" cy="38" r="10" fill="#ff85a1" opacity="0.8"/>
                <circle cx="62" cy="38" r="10" fill="#ff85a1" opacity="0.8"/>
                <circle cx="38" cy="62" r="10" fill="#ff85a1" opacity="0.8"/>
                <circle cx="62" cy="62" r="10" fill="#ff85a1" opacity="0.8"/>
                <!-- Yellow Center -->
                <circle cx="50" cy="50" r="8" fill="#ffe5ec" />
            </svg>
        </div>

        <h1>မွေးနေ့ရက်မြတ်လေးမှာ ပျော်ရွှင်ပါစေ 🌸</h1>
        <p id="message">
            ဒီနေ့ကျရောက်တဲ့ မွေးနေ့ရက်လေးကစပြီး... <br>
            လိုအင်ဆန္ဒတွေ အကုန်ပြည့်ဝပြီး၊ ပျော်ရွှင်စရာတွေ၊ စိတ်အေးချမ်းသာမှုတွေပဲ သင့်ဆီ အမြဲရောက်ရှိလာပါစေ။ ကျန်းမာပျော်ရွှင်ပြီး လှပတဲ့နေ့ရက်တွေကို ပိုင်ဆိုင်နိုင်ပါစေနော်။ 💖
        </p>

        <button class="btn" onclick="changeWishes()">ဒီမှာနှိပ်လိုက်ပါဦး 💖</button>
        <p class="footer">Made with love just for you ✨</p>
    </div>

    <script>
        // Falling petals generator
        const container = document.getElementById('petals-container');
        const totalPetals = 25;

        for (let i = 0; i < totalPetals; i++) {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            // Random positions and delays
            petal.style.left = `${Math.random() * 100}vw`;
            petal.style.width = `${Math.random() * 15 + 10}px`;
            petal.style.height = `${Math.random() * 15 + 10}px`;
            petal.style.animationDuration = `${Math.random() * 5 + 5}s`;
            petal.style.animationDelay = `${Math.random() * 5}s`;
            
            container.appendChild(petal);
        }

        // Interactivity
        const messages = [
            "ဒီထက်မက ပိုပြီးလှပပြီး ပျော်ရွှင်စရာကောင်းတဲ့ နှစ်ပေါင်းများစွာကို ဖြတ်သန်းနိုင်ပါစေ... 🌹",
            "အမြဲပြုံးပျော်နိုင်ပါစေ... မင်းရဲ့အပြုံးလေးက ကမ္ဘာကြီးကို ပိုမိုလှပစေလို့ပါ 😊✨",
            "မွေးနေ့မှာတင်မကဘဲ နေ့တိုင်းနေ့တိုင်း စိတ်ချမ်းသာမှုတွေ အပြည့်ရှိပါစေနော်! 🎉"
        ];
        let currentIndex = 0;

        function changeWishes() {
            const messageElement = document.getElementById('message');
            messageElement.style.opacity = 0;
            setTimeout(() => {
                messageElement.innerHTML = messages[currentIndex];
                messageElement.style.opacity = 1;
                currentIndex = (currentIndex + 1) % messages.length;
            }, 300);
        }
    </script>
</body>
</html>
